services:
  auri-survey-api:
    build:
      context: ./backend
    container_name: auri-survey-api
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./backend/logs:/app/logs:rw
      # scripts/는 호스트에서 read-only로 노출 — run_reward_dispatch.bat이 매번 inject 안 하고
      # 컨테이너 내부 경로 /app/scripts/*.py 를 직접 호출. 컨테이너 재생성에도 영향 없음.
      - ./scripts:/app/scripts:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - mongodb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  mongodb:
    external: true
    name: docker_search-community
