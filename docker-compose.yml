services:
  auri-survey-api:
    build:
      context: ./backend
    container_name: auri-survey-api
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./backend/logs:/app/logs:rw
      # scripts/는 호스트에서 read-only로 노출 — run_reward_dispatch.bat이 매번 inject 안 하고
      # 컨테이너 내부 경로 /app/scripts/*.py 를 직접 호출. 컨테이너 재생성에도 영향 없음.
      - ./scripts:/app/scripts:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - mongodb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  auri-survey-watcher:
    # 응답자 수 10명(MILESTONE_STEP) 단위 도달 시 텔레그램 보고하는 데몬.
    # api와 동일 이미지 재사용 — build cache 적중으로 추가 빌드 비용 없음.
    build:
      context: ./backend
    container_name: auri-survey-watcher
    command: ["python", "/app/scripts/watch_response_milestones.py"]
    env_file:
      - ./backend/.env
      - ./.telegram.env
    environment:
      - TZ=Asia/Seoul
      - MILESTONE_STEP=10
      - POLL_INTERVAL_SEC=60
    volumes:
      - ./scripts:/app/scripts:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - mongodb
    restart: unless-stopped
    # api 이미지의 HEALTHCHECK는 /api/health curl인데 watcher엔 http server가 없어 의미 없음
    healthcheck:
      disable: true

networks:
  mongodb:
    external: true
    name: docker_search-community
